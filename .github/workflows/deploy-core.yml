name: Deploy Core Infrastructure

on:
  push:
    branches: [main]
    paths:
      - "infra/core/**"
      - ".github/workflows/deploy-core.yml"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ROLE }}
          aws-region: ap-southeast-2

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"

      - name: Terraform fmt check
        run: terraform fmt -check -recursive
        working-directory: infra/core

      - name: Terraform init
        working-directory: infra/core
        env:
          TFSTATE_BUCKET: ${{ secrets.TFSTATE_BUCKET }}
          TFSTATE_DYNAMODB: ${{ secrets.TFSTATE_DYNAMODB }}
        run: |
          terraform init \
            -backend-config="bucket=${TFSTATE_BUCKET}" \
            -backend-config="key=api-tx/core.tfstate" \
            -backend-config="region=ap-southeast-2" \
            -backend-config="dynamodb_table=${TFSTATE_DYNAMODB}"

      - name: Terraform plan
        if: github.ref != 'refs/heads/main'
        working-directory: infra/core
        env:
          TF_VAR_lambda_packages_bucket: ${{ secrets.LAMBDA_PACKAGES_BUCKET }}
        run: terraform plan

      - name: Terraform apply
        if: github.ref == 'refs/heads/main'
        working-directory: infra/core
        env:
          TF_VAR_lambda_packages_bucket: ${{ secrets.LAMBDA_PACKAGES_BUCKET }}
        run: terraform apply -auto-approve
